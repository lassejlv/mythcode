[package]
name = "mythcodecode"
version = "0.1.0"
edition = "2024"

[dependencies]
agent-client-protocol = { version = "0.10.4", features = ["unstable_session_model"] }
anyhow = "1.0"
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
crossterm = { version = "0.28", features = ["event-stream"] }
futures-util = "0.3"
ignore = "0.4"
inquire = "0.7"
pulldown-cmark = "0.13"
ratatui = "0.29"
serde_json = "1.0"
similar = "2.7"
tokio = { version = "1.48", features = [
  "macros",
  "process",
  "rt",
  "signal",
  "io-util",
  "io-std",
  "sync",
  "time",
] }
tokio-util = { version = "0.7", features = ["compat"] }
unicode-width = "0.2"
